<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>투어비즈카페 도서관</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ── 헤더 ── */
    header {
      background: #1a5276;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header nav { display: flex; gap: 12px; }
    header nav button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    header nav button:hover { background: rgba(255,255,255,0.15); }
    header nav button.active { background: white; color: #1a5276; font-weight: 600; }

    /* ── 페이지 컨테이너 ── */
    .page { display: none; padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── 섹션 제목 ── */
    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #1a5276;
      border-left: 4px solid #1a5276;
      padding-left: 10px;
    }

    /* ── 이달의 도서 ── */
    .monthly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
      margin-bottom: 40px;
    }

    /* ── 도서 카드 ── */
    .book-card {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }
    .book-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
    .book-card img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      background: #e8eaf0;
    }
    .book-card img.no-image {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    .book-info { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .book-info .title { font-size: 13px; font-weight: 600; line-height: 1.4; }
    .book-info .author { font-size: 12px; color: #777; }
    .book-info .category { font-size: 11px; color: #aaa; }
    .book-info .status-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      width: fit-content;
    }
    .status-badge.available { background: #e8f5e9; color: #2e7d32; }
    .status-badge.rented { background: #fce4ec; color: #c62828; }
    .status-badge.monthly { background: #e3f2fd; color: #1565c0; }

    .rent-btn {
      margin: 0 12px 12px;
      padding: 8px;
      background: #1a5276;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .rent-btn:hover { background: #154360; }
    .rent-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* ── 검색/필터 ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-bar input, .filter-bar select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .filter-bar input { flex: 1; min-width: 180px; }
    .filter-bar input:focus, .filter-bar select:focus { border-color: #1a5276; }

    /* ── 마이페이지 로그인 ── */
    .login-box {
      background: white;
      border-radius: 12px;
      padding: 32px;
      max-width: 420px;
      margin: 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .login-box h2 { font-size: 18px; margin-bottom: 20px; color: #1a5276; text-align: center; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus { border-color: #1a5276; }
    .login-btn {
      width: 100%;
      padding: 12px;
      background: #1a5276;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s;
    }
    .login-btn:hover { background: #154360; }

    /* ── 대여현황 카드 ── */
    .rental-list { display: flex; flex-direction: column; gap: 14px; }
    .rental-card {
      background: white;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }
    .rental-card .book-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .rental-card .meta { font-size: 13px; color: #666; line-height: 1.8; }
    .rental-card .meta span { margin-right: 14px; }
    .extend-btn {
      padding: 8px 16px;
      background: #1a5276;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .extend-btn:hover { background: #154360; }
    .extend-btn:disabled { background: #ccc; cursor: not-allowed; }
    .returned-badge {
      padding: 6px 12px;
      background: #f5f5f5;
      color: #999;
      border-radius: 6px;
      font-size: 13px;
    }
    .logout-btn {
      margin-bottom: 20px;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #666;
    }
    .logout-btn:hover { border-color: #999; color: #333; }

    /* ── 모달 ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; color: #1a5276; }
    .modal .book-name { font-size: 14px; color: #444; margin-bottom: 18px; padding: 10px 12px; background: #f0f4f8; border-radius: 6px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-actions button {
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
    }
    .btn-cancel { background: #eee; color: #555; }
    .btn-confirm { background: #1a5276; color: white; }
    .btn-cancel:hover { background: #ddd; }
    .btn-confirm:hover { background: #154360; }

    /* ── 로딩 / 빈 상태 ── */
    .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }

    /* ── 토스트 ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      header { flex-direction: column; gap: 10px; }
      .monthly-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <h1>📚 투어비즈카페 도서관</h1>
  <nav>
    <button class="active" onclick="showPage('main')">메인</button>
    <button onclick="showPage('mypage')">마이페이지</button>
  </nav>
</header>

<!-- 메인 페이지 -->
<div id="page-main" class="page active">
  <div class="section-title">📖 이달의 도서</div>
  <div id="monthly-books" class="monthly-grid">
    <div class="loading">불러오는 중...</div>
  </div>

  <div class="section-title">📚 전체 도서목록</div>
  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="도서명, 저자 검색..." oninput="filterBooks()" />
    <select id="category-filter" onchange="filterBooks()">
      <option value="">전체 카테고리</option>
    </select>
    <select id="status-filter" onchange="filterBooks()">
      <option value="">전체 상태</option>
      <option value="available">대여가능</option>
      <option value="rented">대여중</option>
    </select>
  </div>
  <div id="book-list" class="monthly-grid">
    <div class="loading">불러오는 중...</div>
  </div>
</div>

<!-- 마이페이지 -->
<div id="page-mypage" class="page">
  <!-- 로그인 폼 -->
  <div id="login-section" class="login-box">
    <h2>🔐 마이페이지 로그인</h2>
    <p style="font-size:13px;color:#888;text-align:center;margin-bottom:20px;">기업명, 이름, 이메일로 대여현황을 확인하세요.</p>
    <div class="form-group">
      <label>기업명</label>
      <input type="text" id="input-company" placeholder="예) 투어비즈" />
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="input-name" placeholder="예) 홍길동" />
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="input-email" placeholder="예) hong@company.com" />
    </div>
    <button class="login-btn" onclick="login()">대여현황 확인</button>
  </div>

  <!-- 대여현황 -->
  <div id="mypage-section" style="display:none;">
    <button class="logout-btn" onclick="logout()">← 로그아웃</button>
    <div class="section-title" id="mypage-title">내 대여현황</div>
    <div id="rental-list" class="rental-list">
      <div class="loading">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 대여신청 모달 -->
<div id="rent-modal" class="modal-overlay">
  <div class="modal">
    <h3>📖 대여신청</h3>
    <div class="book-name" id="modal-book-name"></div>
    <div class="form-group">
      <label>기업명</label>
      <input type="text" id="modal-company" placeholder="기업명 입력" />
    </div>
    <div class="form-group">
      <label>이름</label>
      <input type="text" id="modal-borrower" placeholder="이름 입력" />
    </div>
    <div class="form-group">
      <label>연락처</label>
      <input type="tel" id="modal-phone" placeholder="010-0000-0000" />
    </div>
    <div class="form-group">
      <label>이메일</label>
      <input type="email" id="modal-email" placeholder="이메일 입력" />
    </div>
    <p style="font-size:12px;color:#999;margin-top:4px;">※ 대여기간은 2주이며, 1회(7일) 연장 가능합니다.</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" onclick="submitRent()">대여신청</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbxe603bbTWUZfUE_SGWUqTYvCFlaX1eXlEKGWQ_BmIM6Oh4XVIMh6fzTCRCizmTLJQN/exec';

  let allBooks = [];
  let selectedBookId = '';
  let selectedBookTitle = '';
  let currentUser = null;

  // ── 페이지 전환 ──
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('header nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    event.target.classList.add('active');

    if (name === 'mypage' && currentUser) loadMyRentals();
  }

  // ── 도서 로드 ──
  async function loadBooks() {
    try {
      const [monthly, all] = await Promise.all([
        fetchGet('getMonthlyBooks'),
        fetchGet('getBooks')
      ]);

      renderMonthly(monthly.data || []);
      allBooks = all.data || [];
      buildCategoryFilter();
      renderBooks(allBooks);
    } catch (e) {
      document.getElementById('book-list').innerHTML = '<div class="empty">도서 목록을 불러올 수 없습니다.</div>';
    }
  }

function renderMonthly(books) {
  const el = document.getElementById('monthly-books');
  if (!books.length) { el.innerHTML = '<div class="empty">이달의 도서가 없습니다.</div>'; return; }
  el.innerHTML = books.map(b => bookCardHTML(b, true)).join('');
}

  function renderBooks(books) {
    const el = document.getElementById('book-list');
    if (!books.length) { el.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>'; return; }
    el.innerHTML = books.map(b => bookCardHTML(b, false)).join('');
  }

function bookCardHTML(b, isMonthly) {
  const isRented = b.status === '대여중' || b.status === '이달의도서_대여중';
  const badgeClass = isRented ? 'rented' : (isMonthly ? 'monthly' : 'available');
  const badgeText = isRented ? '대여중' : (isMonthly ? '🆕 최근입고' : '대여가능');
  const imgSrc = b.coverImageUrl
    ? `<img src="${b.coverImageUrl}" alt="${b.title}" onerror="this.src='';this.outerHTML='<div style=\\'width:100%;aspect-ratio:3/4;background:#e8eaf0;display:flex;align-items:center;justify-content:center;font-size:36px\\'>📚</div>'">`
    : `<div style="width:100%;aspect-ratio:3/4;background:#e8eaf0;display:flex;align-items:center;justify-content:center;font-size:36px">📚</div>`;

  const kyoboBtn = b.kyoboLink
    ? `<a href="${b.kyoboLink}" target="_blank" style="display:block;text-align:center;font-size:11px;color:#888;margin:0 12px 8px;text-decoration:none;">도서정보 보기 →</a>`
    : '';

  const actionBtn = isRented
    ? `<button class="rent-btn" disabled>대여중</button>`
    : `<button class="rent-btn" onclick="openRentModal('${b.bookId}', '${escapeQuote(b.title)}')">대여신청</button>`;

  return `
    <div class="book-card">
      ${imgSrc}
      <div class="book-info">
        <div class="title">${b.title}</div>
        <div class="author">${b.author}</div>
        <div class="category">${b.majorCategory} · ${b.subCategory}</div>
        <span class="status-badge ${badgeClass}">${badgeText}</span>
      </div>
      ${kyoboBtn}
      ${actionBtn}
    </div>`;
}

    const kyoboBtn = b.kyoboLink
      ? `<a href="${b.kyoboLink}" target="_blank" style="display:block;text-align:center;font-size:11px;color:#888;margin:0 12px 8px;text-decoration:none;">교보문고 보기 →</a>`
      : '';

    const actionBtn = isRented
      ? `<button class="rent-btn" disabled>대여중</button>`
      : `<button class="rent-btn" onclick="openRentModal('${b.bookId}', '${escapeQuote(b.title)}')">대여신청</button>`;

    return `
      <div class="book-card">
        ${imgSrc}
        <div class="book-info">
          <div class="title">${b.title}</div>
          <div class="author">${b.author}</div>
          <div class="category">${b.majorCategory} · ${b.subCategory}</div>
          <span class="status-badge ${badgeClass}">${badgeText}</span>
        </div>
        ${kyoboBtn}
        ${actionBtn}
      </div>`;
  }

  // ── 필터 ──
  function buildCategoryFilter() {
    const cats = [...new Set(allBooks.map(b => b.majorCategory).filter(Boolean))];
    const sel = document.getElementById('category-filter');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  function filterBooks() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('category-filter').value;
    const statusFilter = document.getElementById('status-filter').value;

    const filtered = allBooks.filter(b => {
      const matchQ = !q || b.title?.toLowerCase().includes(q) || b.author?.toLowerCase().includes(q);
      const matchCat = !cat || b.majorCategory === cat;
      const isRented = b.status === '대여중' || b.status === '이달의도서_대여중';
      const matchStatus = !statusFilter
        || (statusFilter === 'available' && !isRented)
        || (statusFilter === 'rented' && isRented);
      return matchQ && matchCat && matchStatus;
    });
    renderBooks(filtered);
  }

  // ── 대여신청 모달 ──
  function openRentModal(bookId, title) {
    selectedBookId = bookId;
    selectedBookTitle = title;
    document.getElementById('modal-book-name').textContent = title;

    // 로그인 정보 자동 채우기
    if (currentUser) {
      document.getElementById('modal-company').value = currentUser.company;
      document.getElementById('modal-borrower').value = currentUser.name;
      document.getElementById('modal-email').value = currentUser.email;
    }

    document.getElementById('rent-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('rent-modal').classList.remove('open');
    selectedBookId = '';
    selectedBookTitle = '';
  }

  async function submitRent() {
    const companyName = document.getElementById('modal-company').value.trim();
    const borrowerName = document.getElementById('modal-borrower').value.trim();
    const phone = document.getElementById('modal-phone').value.trim();
    const email = document.getElementById('modal-email').value.trim();

    if (!companyName || !borrowerName || !email) {
      showToast('기업명, 이름, 이메일은 필수입니다.');
      return;
    }

    try {
      const res = await fetchPost({ action: 'rentBook', bookId: selectedBookId, companyName, borrowerName, phone, email });
      if (res.success) {
        showToast(`✅ 대여신청 완료! 반납일: ${res.data.dueDate}`);
        closeModal();
        loadBooks(); // 목록 새로고침
      } else {
        showToast('❌ ' + res.message);
      }
    } catch (e) {
      showToast('오류가 발생했습니다. 다시 시도해주세요.');
    }
  }

  // ── 마이페이지 로그인 ──
  async function login() {
    const company = document.getElementById('input-company').value.trim();
    const name = document.getElementById('input-name').value.trim();
    const email = document.getElementById('input-email').value.trim();

    if (!company || !name || !email) {
      showToast('모든 항목을 입력해주세요.');
      return;
    }

    currentUser = { company, name, email };
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('mypage-section').style.display = 'block';
    document.getElementById('mypage-title').textContent = `${name}님의 대여현황`;
    loadMyRentals();
  }

  function logout() {
    currentUser = null;
    document.getElementById('login-section').style.display = 'block';
    document.getElementById('mypage-section').style.display = 'none';
    document.getElementById('input-company').value = '';
    document.getElementById('input-name').value = '';
    document.getElementById('input-email').value = '';
  }

  async function loadMyRentals() {
    const el = document.getElementById('rental-list');
    el.innerHTML = '<div class="loading">불러오는 중...</div>';

    try {
      const res = await fetchGet('getMyRentals', {
        companyName: currentUser.company,
        borrowerName: currentUser.name,
        email: currentUser.email
      });

      if (!res.success) { showToast('❌ ' + res.message); logout(); return; }

      const rentals = res.data || [];
      if (!rentals.length) { el.innerHTML = '<div class="empty">대여 내역이 없습니다.</div>'; return; }

      el.innerHTML = rentals.map(r => rentalCardHTML(r)).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty">불러오기에 실패했습니다.</div>';
    }
  }

  function rentalCardHTML(r) {
    const isRented = r.status === '대여중';
    const canExtend = isRented && r.extended !== 'Y';

    const actionBtn = !isRented
      ? `<span class="returned-badge">반납완료</span>`
      : canExtend
        ? `<button class="extend-btn" onclick="extend('${r.rentalId}')">기간 연장</button>`
        : `<button class="extend-btn" disabled>연장완료</button>`;

    return `
      <div class="rental-card">
        <div>
          <div class="book-title">${r.bookTitle}</div>
          <div class="meta">
            <span>📅 대여일: ${r.rentalDate}</span>
            <span>⏰ 반납일: ${r.dueDate}</span>
            ${r.returnDate ? `<span>✅ 반납완료: ${r.returnDate}</span>` : ''}
            ${r.extended === 'Y' ? '<span style="color:#e67e22">📌 연장됨</span>' : ''}
          </div>
        </div>
        ${actionBtn}
      </div>`;
  }

  async function extend(rentalId) {
    if (!confirm('대여기간을 7일 연장하시겠습니까? (1회만 가능)')) return;
    try {
      const res = await fetchPost({ action: 'extendRental', rentalId, email: currentUser.email });
      showToast(res.success ? `✅ ${res.message} (새 반납일: ${res.data.newDueDate})` : '❌ ' + res.message);
      if (res.success) loadMyRentals();
    } catch (e) {
      showToast('오류가 발생했습니다.');
    }
  }

  // ── API 헬퍼 ──
  async function fetchGet(action, params = {}) {
    const qs = new URLSearchParams({ action, ...params }).toString();
    const res = await fetch(`${API_URL}?${qs}`);
    return res.json();
  }

  async function fetchPost(body) {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    return res.json();
  }

  // ── 토스트 ──
  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── 유틸 ──
  function escapeQuote(str) {
    return str ? str.replace(/'/g, "\\'") : '';
  }

  // ── 초기 로드 ──
  loadBooks();
</script>
</body>
</html>
